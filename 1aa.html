function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

function extractJSON(text) {
    try {
        text = text.replace(/```json|```/g, '');
        const match = text.match(/\{[\s\S]*\}/);
        if (!match) return null;
        return JSON.parse(match[0]);
    } catch (e) {
        console.error("JSON parse error:", e);
        return null;
    }
}

async function processFile() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Please select a file first.");

    startLoading(); // START LOADING

    const base64 = await fileToBase64(file);

    const prompt = `
Extract bill details STRICTLY as JSON only.

{
  "date": "",
  "amount": "",
  "description": "",
  "issuer": ""
}

Rules:
- No markdown
- No explanation
- Only JSON
`;

    try {
        const res = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-goog-api-key": API_KEY
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: file.type, data: base64 } }
                        ]
                    }]
                })
            }
        );

        const data = await res.json();
        const output = data?.candidates?.[0]?.content?.parts?.[0]?.text;

        if (!output) throw "No response from API";

        const json = extractJSON(output);

        if (!json) {
            stopLoading();
            return alert("⚠️ Could not extract bill data.");
        }

        $('#billDate').val(json.date || "");
        $('#billAmount').val(json.amount || "");
        $('#billDesc').val(json.description || "");
        $('#billIssuer').val(json.issuer || "");

    } catch (err) {
        console.error(err);
        alert("❌ Error processing file.");
    } finally {
        stopLoading(); // ✅ STOP LOADING
    }
}



function startLoading() {
    $("#progressContainer").show();
    $("#progressBar").css("width", "10%");
    $("button").prop("disabled", true);

    // Fake smooth progress animation
    let progress = 10;
    window.loadingInterval = setInterval(() => {
        if (progress < 90) {
            progress += Math.random() * 10;
            $("#progressBar").css("width", progress + "%");
        }
    }, 300);
}

function stopLoading() {
    clearInterval(window.loadingInterval);
    $("#progressBar").css("width", "100%");

    setTimeout(() => {
        $("#progressContainer").hide();
        $("#progressBar").css("width", "0%");
        $("button").prop("disabled", false);
    }, 500);
}
