<!DOCTYPE html>
<html>
<head>
    <title>Bill Extractor</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            display: flex;
            gap: 20px;
        }
        .left { width: 40%; }
        .right { width: 60%; }
        .extractorbox {
            border: 1px solid rgb(2, 2, 2);
            padding: 20px;
            border-radius: 10px;
        }
        .field {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label { font-weight: bold; font-size: 14px; }
        input[type="text"] {
            padding: 8px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #42a5f5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 5px;
        }
        button:hover { background: #113a94; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 8px; text-align: center; }
        #progressContainer {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #42a5f5, #1e88e5);
            transition: width 0.3s ease;
        }

        .bill-block {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 14px;
            background: #fafafa;
        }
        .bill-block.saved {
            opacity: 0.4;
            pointer-events: none;
            background: #f0f0f0;
        }
        .bill-block-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-save-one {
            width: 100%;
            margin-top: 4px;
            background: #43a047;
            font-size: 13px;
            padding: 8px;
        }
        .btn-save-one:hover { background: #2e7d32; }
    </style>
</head>

<body>

<div class="left">
<div class="extractorbox">

    <h2>Bill Extractor</h2>

    <input type="file" id="fileInput" accept="image/*,.pdf" multiple />
    <br>
    <button onclick="processFiles()">Extract Bill Details</button>

    <div id="progressContainer" style="display:none; margin-top:15px;">
        <div id="progressBar"></div>
    </div>

    <hr>

    <div id="billsList"></div>

</div>
</div>

<div class="right">
    <h2 style="margin-top:40px; margin-left:5px;">Saved Records</h2>
    <table id="recordsTable">
        <thead>
            <tr>
                <th>Trn ID</th>
                <th>Date</th>
                <th>Amount</th>
                <th>Description</th>
                <th>Issued By</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
const API_KEYS = [
    "AIzaSyBuq4UqHA8EyCw1xn-ptEQFHrNl7JHHVhk",
    "AIzaSyBGQ-Hj4sdwrRJ75Kgzzbxyy15TYnJGlHA"

];

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

function extractJSON(text) {
    try {
        text = text.replace(/```json|```/g, '');
        const match = text.match(/\{[\s\S]*\}/);
        if (!match) return null;
        return JSON.parse(match[0]);
    } catch (e) { return null; }
}

async function callAPIWithKeyRotation(base64, fileType, prompt) {
    for (let i = 0; i < API_KEYS.length; i++) {
        try {
            const res = await fetch(
                "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent",
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-goog-api-key": API_KEYS[i] },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: fileType, data: base64 } }
                            ]
                        }]
                    })
                }
            );
            const data = await res.json();
            if (data.error) continue;
            const output = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!output) continue;
            return output;
        } catch (err) { continue; }
    }
    throw new Error("All API keys failed");
}

async function processFiles() {
    const files = Array.from(document.getElementById('fileInput').files);
    if (!files.length) return alert("Please select at least one file.");

    $('#billsList').empty();
    startLoading();

    const prompt = `Extract bill details STRICTLY as JSON only.
{
  "date": "MM/DD/YYYY",
  "amount": "",
  "description": "",
  "issuer": ""
}
  
Rules:
- Date MUST be in MM/DD/YYYY format
- Amount MUST be numeric with 2 decimal places
- No markdown
- No explanation
- Only JSON
`;

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const blockId = 'bill-' + i;

        $('#billsList').append(
            '<div class="bill-block" id="' + blockId + '">' +
                '<div class="bill-block-title">' + file.name + '</div>' +
                '<div class="field"><label>Date</label><input type="text" id="date-' + i + '" placeholder="Extracting..." /></div>' +
                '<div class="field"><label>Amount</label><input type="text" id="amount-' + i + '" placeholder="Extracting..." /></div>' +
                '<div class="field"><label>Description</label><input type="text" id="desc-' + i + '" placeholder="Extracting..." /></div>' +
                '<div class="field"><label>Issued By</label><input type="text" id="issuer-' + i + '" placeholder="Extracting..." /></div>' +
                '<button class="btn-save-one" id="savebtn-' + i + '" onclick="saveOne(' + i + ')">Save Record</button>' +
            '</div>'
        );

        try {
            const base64 = await fileToBase64(file);
            const output = await callAPIWithKeyRotation(base64, file.type, prompt);
            const json = extractJSON(output);

            if (json) {
                $('#date-' + i).val(json.date || '').attr('placeholder', '');
                $('#amount-' + i).val(json.amount || '').attr('placeholder', '');
                $('#desc-' + i).val(json.description || '').attr('placeholder', '');
                $('#issuer-' + i).val(json.issuer || '').attr('placeholder', '');
            } else {
                $('#date-' + i + ', #amount-' + i + ', #desc-' + i + ', #issuer-' + i).attr('placeholder', 'Could not extract');
            }
        } catch (err) {
            $('#date-' + i + ', #amount-' + i + ', #desc-' + i + ', #issuer-' + i).attr('placeholder', 'Error');
        }

        var pct = Math.round(((i + 1) / files.length) * 100);
        $('#progressBar').css('width', pct + '%');
    }

    stopLoading();
}

function saveOne(index) {
    var date   = $('#date-' + index).val();
    var amount = $('#amount-' + index).val();
    var desc   = $('#desc-' + index).val();
    var issuer = $('#issuer-' + index).val();

    if (!date && !amount) return alert("No data to save.");

    var trnId = "TRN-" + Date.now();
    var row = '<tr>' +
        '<td>' + trnId + '</td>' +
        '<td>' + (date || '—') + '</td>' +
        '<td>' + (amount || '—') + '</td>' +
        '<td>' + (desc || '—') + '</td>' +
        '<td>' + (issuer || '—') + '</td>' +
    '</tr>';
    $('#recordsTable tbody').append(row);

    // Freeze the block to prevent re-saving
    $('#bill-' + index).addClass('saved');
}

function startLoading() {
    $("#progressContainer").show();
    $("#progressBar").css("width", "0%");
    $("button").prop("disabled", true);
}

function stopLoading() {
    setTimeout(function() {
        $("#progressContainer").hide();
        $("#progressBar").css("width", "0%");
        $("button").prop("disabled", false);
    }, 500);
}
</script>

</body>
</html>
